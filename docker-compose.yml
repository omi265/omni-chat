services:
  omni-server:
    build: .
    container_name: omni-server
    ports:
      - "2650:2650"
    volumes:
      - ./p2p-data:/data
    restart: unless-stopped
    environment:
      - PORT=2650
      - DATA_DIR=/data
      - NODE_ENV=production
      - SUPER_ADMIN_USERNAME=admin # Change this if needed
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
